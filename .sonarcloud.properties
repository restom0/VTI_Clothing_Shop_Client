# SonarQube Cloud Automatic Analysis reads this file.
# Keep coverage reports out of source analysis; coverage/lcov.info remains for CI-based scans only.
sonar.exclusions=coverage/**,**/coverage/**,dist/**,node_modules/**,public/**,src/i18n/generated/**
sonar.coverage.exclusions=coverage/**,**/coverage/**,src/main.jsx,src/**/*.test.js,src/**/*.test.jsx,src/**/*.spec.js,src/**/*.spec.jsx,src/i18n/generated/**
