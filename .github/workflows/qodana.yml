name: Qodana (Client)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  qodana:
    name: Qodana Quality Scan
    runs-on: ubuntu-latest
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
    steps:
      - name: Guard (token present?)
        id: guard
        run: |
          if [ -n "${QODANA_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::QODANA_TOKEN not configured — skipping Qodana scan."
          fi

      - name: Checkout
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        if: steps.guard.outputs.enabled == 'true'
        uses: JetBrains/qodana-action@v2026.1.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
