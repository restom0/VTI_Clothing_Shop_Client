name: Vercel Deploy (Client)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Guard (secrets present?)
        id: guard
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured — skipping deploy."
          fi

      - name: Checkout
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install Vercel CLI
        if: steps.guard.outputs.enabled == 'true'
        run: npm install -g vercel@56.2.0

      - name: Resolve target environment
        if: steps.guard.outputs.enabled == 'true'
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        if: steps.guard.outputs.enabled == 'true'
        run: vercel pull --yes --environment=${{ steps.target.outputs.env }} --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        if: steps.guard.outputs.enabled == 'true'
        run: vercel build ${{ steps.target.outputs.flag }} --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: steps.guard.outputs.enabled == 'true'
        run: vercel deploy --prebuilt ${{ steps.target.outputs.flag }} --token="$VERCEL_TOKEN"
