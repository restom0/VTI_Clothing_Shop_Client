name: Client CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Lint, Test, Build & Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || 'VTI_Clothing_Shop_Client' }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # SonarCloud needs full history for blame

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint, 0 warnings)
        run: yarn lint

      - name: Prettier check
        run: yarn format:check

      - name: Test with coverage
        run: yarn test:coverage # enforces coverage thresholds (vite.config.js)

      - name: Publish test results
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        with:
          report_paths: test-report.junit.xml
          check_name: Client test results
          fail_on_failure: false

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build
        run: yarn build

      - name: Validate Sonar configuration
        shell: bash
        run: |
          missing=()
          [ -n "${SONAR_TOKEN}" ] || missing+=("SONAR_TOKEN secret")
          [ -n "${SONAR_ORGANIZATION}" ] || missing+=("SONAR_ORGANIZATION secret")
          [ -n "${SONAR_PROJECT_KEY}" ] || missing+=("SONAR_PROJECT_KEY secret")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Sonar configuration: %s\n' "${missing[*]}"
            exit 1
          fi

          printf '::notice::If SonarCloud Automatic Analysis is enabled for this project, disable it before using CI analysis.\n'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.exclusions=coverage/**,dist/**,node_modules/**,public/**,src/i18n/generated/**
            -Dsonar.coverage.exclusions=src/main.jsx,src/**/*.test.js,src/**/*.test.jsx,src/**/*.spec.js,src/**/*.spec.jsx,src/i18n/generated/**
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
