name: Client CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint, 0 warnings)
        run: yarn lint

      - name: Prettier check
        run: yarn format:check

      - name: Test with coverage
        run: yarn test:coverage # enforces coverage thresholds (vite.config.js)

      - name: Publish test results
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        with:
          report_paths: test-report.junit.xml
          check_name: Client test results
          fail_on_failure: false

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build
        run: yarn build
