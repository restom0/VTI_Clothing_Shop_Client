name: Client CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Lint, Test, Build & Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || 'VTI_Clothing_Shop_Client' }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # SonarCloud needs full history for blame

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint, 0 warnings)
        run: yarn lint

      - name: Prettier check
        run: yarn format:check

      - name: Test with coverage
        run: yarn test:coverage # enforces coverage thresholds (vite.config.js)

      - name: Publish test results
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        with:
          report_paths: test-report.junit.xml
          check_name: Client test results
          fail_on_failure: false

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build
        run: yarn build

      - name: Validate Sonar configuration
        shell: bash
        run: |
          missing=()
          [ -n "${SONAR_TOKEN}" ] || missing+=("SONAR_TOKEN secret")
          [ -n "${SONAR_ORGANIZATION}" ] || missing+=("SONAR_ORGANIZATION secret")
          [ -n "${SONAR_PROJECT_KEY}" ] || missing+=("SONAR_PROJECT_KEY secret")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Sonar configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
