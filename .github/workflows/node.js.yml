name: Client CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || 'VTI_Clothing_Shop_Client' }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (ESLint, 0 warnings)
        run: yarn lint

      - name: Prettier check
        run: yarn format:check

      - name: Test with coverage
        run: yarn test:coverage # enforces coverage thresholds (vite.config.js)

      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Publish test results
        if: ${{ always() }}
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        with:
          report_paths: test-report.junit.xml
          check_name: Client test results
          fail_on_failure: false

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build
        run: yarn build

      - name: Validate Sonar configuration
        id: sonar_config
        if: ${{ always() }}
        shell: bash
        run: |
          missing=()
          [ -n "${SONAR_TOKEN}" ] || missing+=("SONAR_TOKEN secret")
          [ -n "${SONAR_ORGANIZATION}" ] || missing+=("SONAR_ORGANIZATION secret")
          [ -n "${SONAR_PROJECT_KEY}" ] || missing+=("SONAR_PROJECT_KEY secret")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Sonar configuration: %s\n' "${missing[*]}"
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          printf '::notice::If SonarCloud Automatic Analysis is enabled for this project, disable it before using CI analysis.\n'

      - name: SonarCloud Scan
        id: sonar_scan
        if: ${{ always() && steps.sonar_config.outputs.ready == 'true' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}

      - name: SonarQube Quality Gate
        if: ${{ always() && steps.sonar_scan.outcome == 'success' }}
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
